name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Export Web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-4.7-stable-with-templates

      - name: Download Godot 4.7 and export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -sL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v4.7-stable_linux.x86_64 ~/godot/godot
          curl -sL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz -o /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.7.stable/

      - name: Import project
        run: ~/godot/godot --headless --path . --import || true

      - name: Export Web build
        run: |
          mkdir -p build/web
          ~/godot/godot --headless --path . --export-release "Web" build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
