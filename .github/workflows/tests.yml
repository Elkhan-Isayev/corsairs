name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Headless unit & smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.7-stable-linux

      - name: Download Godot 4.7
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          curl -sL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v4.7-stable_linux.x86_64 ~/godot/godot

      - name: Import project
        run: ~/godot/godot --headless --path . --import || true

      - name: Run unit tests
        run: ~/godot/godot --headless --path . -s tests/run_tests.gd

      - name: Run scene smoke test
        run: ~/godot/godot --headless --path . -s tests/smoke_scenes.gd
